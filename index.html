    <style>
        :root {
            --primary-color: #ff6b6b;
            --bg-color: #fff5f5;
            --text-color: #4a4a4a;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
        }
        header {
            text-align: center;
            padding: 50px 20px;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .main-title { font-size: 2rem; color: var(--primary-color); margin-bottom: 10px; }
        .anniversary { font-size: 1.1rem; color: #888; }
        .big-counter {
            font-size: 1.5rem;
            margin-top: 20px;
            font-weight: bold;
            color: var(--primary-color);
        }

        /* 时间轴容器 */
        .timeline {
            max-width: 800px;
            margin: 40px auto;
            position: relative;
            padding: 20px;
        }
        .timeline::after {
            content: '';
            position: absolute;
            width: 2px;
            background: var(--primary-color);
            top: 0; bottom: 0; left: 50%;
            margin-left: -1px;
        }

        /* 记忆卡片 */
        .memory-card {
            padding: 10px 40px;
            position: relative;
            width: 50%;
            box-sizing: border-box;
        }
        .memory-card::after {
            content: '❤';
            position: absolute;
            width: 20px; height: 20px;
            right: -10px; top: 15px;
            background: white;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            z-index: 1;
            text-align: center; font-size: 12px; line-height: 20px; color: var(--primary-color);
        }
        .left { left: 0; text-align: right; }
        .right { left: 50%; text-align: left; }
        .right::after { left: -10px; }

        .content {
            padding: 20px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }
        .content:hover { transform: scale(1.02); }
        .content h3 { margin: 0 0 10px; color: var(--primary-color); font-size: 1rem; }
        .content p { font-size: 0.9rem; line-height: 1.6; margin: 10px 0; }
        .content img, .content video {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        @media screen and (max-width: 600px) {
            .timeline::after { left: 31px; }
            .memory-card { width: 100%; padding-left: 70px; padding-right: 25px; text-align: left; }
            .memory-card::after { left: 21px; }
            .right { left: 0%; }
        }
    </style>
</head>
