<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我们的时光屋</title>
    <style>
        :root {
            --primary-color: #ff6b6b;
            --bg-color: #1a3db3;
            --text-color: #e9ecf1;
            --card-bg: rgba(255, 255, 255, 0.05);
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        
        /* 顶部标题区 */
        header {
            text-align: center;
            padding: 40px 20px 10px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }
        .main-title { font-size: 2.2rem; color: var(--primary-color); margin-bottom: 10px; font-weight: bold; }
        .anniversary { font-size: 1.1rem; color: #a0aab5; letter-spacing: 1px; }
        .big-counter {
            font-size: 1.6rem;
            margin-top: 15px;
            font-weight: bold;
            color: #ff4f9a;
            text-shadow: 0 0 10px rgba(255,79,154,0.3);
        }

        /* === 爱心演示区域 === */
        .heart-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
            gap: 15px;
            background: radial-gradient(circle at center, rgba(255,80,140,0.05), transparent 70%);
        }
        canvas {
            width: min(92vw, 700px);
            height: min(50vh, 400px);
            border-radius: 18px;
            background: rgba(255,255,255,0.01);
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 15px 40px rgba(0,0,0,.5);
            will-change: transform;
        }
        /* 诗句区域 */
        .poem {
            width: min(92vw, 700px);
            text-align: center;
            line-height: 2;
            font-size: 16px;
            letter-spacing: 1px;
            user-select: none;
            opacity: 0.95;
            text-shadow: 0 0 15px rgba(0,0,0,0.5);
            will-change: transform;
            margin-bottom: 20px;
            transition: color 0.5s ease;
        }
        .poem-line { padding: 2px 0; }

        /* 跳动动画 */
        @keyframes pulse {
            0%   { transform: scale(1); }
            35%  { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        .pulse {
            animation: pulse 260ms ease-out;
            transform-origin: 50% 50%;
        }

       
        .settings-menu {
            position: fixed;
            top: 20px; right: 20px;
            z-index: 100;
        }
        .settings-toggle {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white; width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center;
        }
        .controls {
            position: absolute; top: 50px; right: 0;
            background: rgba(11, 15, 26, 0.95);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 15px; border-radius: 12px;
            display: none; flex-direction: column; gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 260px;
        }
        .controls.show { display: flex; }
        .btn-group { display: flex; gap: 10px; }
        .btn {
            flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
            color: #fff; padding: 6px; border-radius: 6px; cursor: pointer; font-size: 13px;
        }
        .btn:hover { background: rgba(255,255,255,0.2); }
        .panel-label { font-size: 11px; display: flex; justify-content: space-between; align-items: center; color: #ccc; }
        .panel-label input { width: 120px; }
        input[type="color"] { width: 30px; height: 20px; border: none; background: transparent; padding:0;}

        /* === 时光轴生命线区域 === */
        .timeline {
            max-width: 1500px;
            margin: 30px auto 60px;
            position: relative;
            padding: 20px;
        }
        .timeline::after {
            content: '';
            position: absolute;
            width: 2px;
            background: linear-gradient(to bottom, #ff4f9a, var(--primary-color));
            top: 0; bottom: 0; left: 50%;
            margin-left: -1px;
        }

        /* 记忆卡片 */
        .memory-card {
            padding: 10px 50px;
            position: relative;
            width: 50%;
            box-sizing: border-box;
        }
        .memory-card::after {
            content: '❤';
            position: absolute;
            width: 22px; height: 22px;
            right: -11px; top: 20px;
            background: #0b0f1a;
            border: 2px solid var(--primary-color);
            border-radius: 50%;
            z-index: 1;
            text-align: center; font-size: 11px; line-height: 22px; color: var(--primary-color);
        }
        .left { left: 0; text-align: right; }
        .right { left: 50%; text-align: left; }
        .right::after { left: -11px; }

        .content {
            padding: 20px 15px;
            background: var(--card-bg);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s, border-color 0.3s;
        }
        .content:hover { 
            transform: translateY(-4px); 
            border-color: rgba(255, 107, 107, 0.3);
        }
        .content h3 { margin: 0 0 12px; color: var(--primary-color); font-size: 1.1rem; font-weight: 600; }
        .content p { font-size: 0.95rem; line-height: 1.7; margin: 10px 0; white-space: pre-line; color: #d1d9e0; }
        .content img, .content video {
            width: 100%;
            border-radius: 12px;
            margin-top: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        footer {
            padding: 25px; font-size: 12px; opacity: .5; text-align: center; letter-spacing: 0.5px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        @media screen and (max-width: 700px) {
            .timeline::after { left: 31px; }
            .memory-card { width: 100%; padding-left: 65px; padding-right: 20px; text-align: left; }
            .memory-card::after { left: 20px; }
            .right { left: 0%; }
        }
    </style>
</head>
<body>

<!-- 右上角隐藏的高级控制悬浮窗 -->
<div class="settings-menu">
    <button class="settings-toggle" onclick="document.getElementById('controlsPanel').classList.toggle('show')">⚙</button>
    <div class="controls" id="controlsPanel">
        <div class="btn-group">
            <button id="toggle" class="btn">暂停心跳</button>
            <button id="reset" class="btn">重置参数</button>
        </div>
        <hr style="border:0;border-top:1px solid rgba(255,255,255,0.1);margin:5px 0;">
        <label class="panel-label">速度 <input id="speed" type="range" min="0.005" max="0.25" step="0.005" value="0.05"></label>
        <label class="panel-label">振幅 <input id="amp" type="range" min="0" max="1.4" step="0.01" value="0.90"></label>
        <label class="panel-label">密度 <input id="xStep" type="range" min="0.003" max="0.03" step="0.001" value="0.01"></label>
        <label class="panel-label">点大小 <input id="dot" type="range" min="1" max="6" step="0.2" value="2.2"></label>
        <label class="panel-label">发光 <input id="glow" type="range" min="0" max="30" step="1" value="12"></label>
        <label class="panel-label">主色调 <input id="color" type="color" value="#ff4f9a"></label>
    </div>
</div>

<header>
    <div class="main-title">🧡 春宝和幻宝的时光屋 🧡</div>
    <div class="anniversary">起点：2026年1月1日</div>
    <div id="bigCounter" class="big-counter"></div>
</header>

<!-- 前置组合的爱心区域 -->
<div class="heart-container">
    <canvas id="c"></canvas>
    <div id="poem" class="poem">
        <div class="poem-line">我经常好奇，你是谁</div>
        <div class="poem-line">那天，你的心跳与我的脉搏共振</div>
        <div class="poem-line">原来你就是我</div>
    </div>
</div>

<!-- 下方时间轴回忆墙 -->
<div class="timeline" id="timeline"></div>

<footer>
    提示：点击右上角设置可以调节爱心波形哦
</footer>

<script>
(() => {
    // === 1. 恋爱天数统计逻辑 ===
    const startDate = new Date("2026-01-01");
    function getDaysCount(currentDateStr) {
        const current = new Date(currentDateStr);
        const diff = current - startDate;
        return Math.floor(diff / (1000 * 60 * 60 * 24)) ;
    }
    const today = new Date();
    document.getElementById('bigCounter').innerText = `今天是我们同舟共济的第 ${getDaysCount(today)} 天`;

    // === 2. 爱心 Canvas 渲染核心算法 ===
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    function resize() {
        const dpr = Math.max(1, Math.min(2.5, window.devicePixelRatio || 1));
        const rect = canvas.getBoundingClientRect();
        canvas.width  = Math.floor(rect.width * dpr);
        canvas.height = Math.floor(rect.height * dpr);
        ctx.setTransform(dpr,0,0,dpr,0,0);
    }
    window.addEventListener("resize", resize);
    resize();

    // 控制面板元素绑定
    const el = (id) => document.getElementById(id);
    const speed = el("speed"), amp = el("amp"), xStep = el("xStep"), dot = el("dot"), color = el("color"), glow = el("glow");
    const poemEl = el("poem");

    // 预设自动循环变换的彩虹色盘
    const palette = ["#ff4f9a", "#ff3b3b", "#ffb703", "#7c4dff", "#35c2ff", "#31e981"];
    let paletteIndex = 0;

    function applyColor(hex){
        color.value = hex;
        poemEl.style.color = hex;
    }

    function pulseOnce(){
        canvas.classList.remove("pulse");
        poemEl.classList.remove("pulse");
        void canvas.offsetWidth; // 触发重绘
        canvas.classList.add("pulse");
        poemEl.classList.add("pulse");
        setTimeout(() => {
            canvas.classList.remove("pulse");
            poemEl.classList.remove("pulse");
        }, 300);
    }

    // 定时换色与频率跳动
    applyColor(palette[paletteIndex]);
    setInterval(() => {
        paletteIndex = (paletteIndex + 1) % palette.length;
        applyColor(palette[paletteIndex]);
        pulseOnce();
    }, 2000);

    color.addEventListener("input", () => {
        poemEl.style.color = color.value;
        pulseOnce();
    });

    // 数学心脏方程公式
    const X_MIN = -1.81, X_MAX = 1.81, SQRT_A = 3.3;
    let k = 0, running = true;

    function heartY(x, kVal, ampVal){
        const x2 = x*x;
        const base = Math.pow(x2, 1/3);
        const inside = SQRT_A - x2;
        const wave = inside > 0 ? Math.sqrt(inside) : 0;
        return base + ampVal * wave * Math.sin(kVal * Math.PI * x);
    }

    function render(){
        const w = canvas.getBoundingClientRect().width;
        const h = canvas.getBoundingClientRect().height;
        ctx.clearRect(0,0,w,h);

        const step = Number(xStep.value), ampV = Number(amp.value), dotSize = Number(dot.value);
        let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
        const pts = [];

        for(let x=X_MIN; x<=X_MAX+1e-9; x+=step){
            const y = heartY(x, k, ampV);
            pts.push([x,y]);
            if(x<minX) minX=x; if(x>maxX) maxX=x;
            if(y<minY) minY=y; if(y>maxY) maxY=y;
        }

        const pad = 0.12;
        const dx = (maxX - minX) || 1; const dy = (maxY - minY) || 1;
        minX -= dx*pad; maxX += dx*pad; minY -= dy*pad; maxY += dy*pad;

        const mapX = (x)=> (x - minX) / (maxX - minX) * w;
        const mapY = (y)=> h - (y - minY) / (maxY - minY) * h;

        ctx.save();
        ctx.fillStyle = color.value;
        ctx.shadowColor = color.value;
        ctx.shadowBlur = Number(glow.value);

        for(const [x,y] of pts){
            ctx.beginPath();
            ctx.arc(mapX(x), mapY(y), dotSize, 0, Math.PI*2);
            ctx.fill();
        }
        ctx.restore();
    }

    function tick(){
        if(running) k += Number(speed.value);
        render();
        requestAnimationFrame(tick);
    }
    tick();

    // 暂停/重置动作分配
    const toggleBtn = el("toggle");
    toggleBtn.addEventListener("click", ()=> {
        running = !running;
        toggleBtn.textContent = running ? "暂停心跳" : "开启心跳";
    });
    el("reset").addEventListener("click", ()=> { k = 0; render(); });

    memories.forEach((item, index) => {
        const days = getDaysCount(item.date);
        const side = index % 2 === 0 ? 'left' : 'right';
        
        // 只有提供有效链接时才渲染图片或视频
        const mediaTag = item.url && !item.url.includes('placeholder')
            ? (item.type === 'video' ? `<video controls src="${item.url}"></video>` : `<img src="${item.url}" alt="memory">`)
            : '';

        const card = `
            <div class="memory-card ${side}">
                <div class="content">
                    <h3>${item.date} · 第 ${days} 天</h3>
                    <p><strong>${item.title}</strong></p>
                    <p>${item.thought}</p>

                </div>
            </div>
